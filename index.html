<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Statcast Pro Tracker</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; height: 100%; font-family: sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #status-box { position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.5); padding: 10px; }
        #red-dot { position: absolute; width: 20px; height: 20px; background: red; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; box-shadow: 0 0 10px red; opacity: 0.8; }
        /* Calibration button - visible and clickable */
        #calibrate-btn { position: absolute; bottom: 20px; right: 20px; padding: 15px; background: #222; color: white; border: 1px solid white; border-radius: 8px; pointer-events: auto; }
        #webgazerVideoContainer { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status-box">
        <div id="msg">INITIALIZING...</div>
        <small id="sub-msg">Tap the screen where you are looking to calibrate!</small>
    </div>
    <div id="red-dot"></div>
    <button id="calibrate-btn" onclick="location.reload()">RESET</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    let scene, camera, renderer, ball;
    let pitchPath = [];
    let progress = 0;
    let gameState = 'CALIBRATING'; 
    let calibrationPoints = 0;

    const dot = document.getElementById('red-dot');
    const msg = document.getElementById('msg');

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040));
        let sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 2);
        scene.add(sun);

        // Baseball
        ball = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ball.visible = false;
        scene.add(ball);

        // Path
        for (let i = 0; i <= 100; i++) {
            let t = i / 100;
            pitchPath.push(new THREE.Vector3(Math.sin(t*3)*0.5, 6-(t*4), -60.5 + (60.5 * t)));
        }
        animate();
    }

    function startGaze() {
        webgazer.setRegression('ridge') 
            .setGazeListener((data, elapsed) => {
                if (!data) return;

                // 1. Move the Red Dot
                dot.style.left = data.x + 'px';
                dot.style.top = data.y + 'px';

                // 2. Logic based on state
                const ny = (data.y / window.innerHeight);

                if (gameState === 'READY') {
                    if (ny > 0.7) { // Look Down
                        gameState = 'SET';
                        msg.innerText = "LOOK AT THE MOUND!";
                    }
                } else if (gameState === 'SET') {
                    if (ny < 0.3) { // Look Up
                        gameState = 'PITCHING';
                        msg.innerText = "EYES ON THE BALL!";
                        ball.visible = true;
                        progress = 0;
                    }
                } else if (gameState === 'PITCHING') {
                    trackBall(data);
                }
            }).begin();

        // Important: Click to calibrate
        window.onclick = (e) => {
            webgazer.recordScreenPosition(e.clientX, e.clientY, 'click');
            calibrationPoints++;
            if (calibrationPoints > 5 && gameState === 'CALIBRATING') {
                gameState = 'READY';
                msg.innerText = "LOOK AT THE PLATE (DOWN)";
            }
        };
    }

    function trackBall(gazeData) {
        // Project ball to screen coordinates
        const vector = ball.position.clone().project(camera);
        const bx = (vector.x + 1) / 2 * window.innerWidth;
        const by = (-(vector.y - 1) / 2) * window.innerHeight;

        const dist = Math.sqrt(Math.pow(gazeData.x - bx, 2) + Math.pow(gazeData.y - by, 2));

        // Focus/Zoom Logic
        if (dist < 120) {
            camera.fov = THREE.MathUtils.lerp(camera.fov, 40, 0.1);
            if (dist < 50 && progress > 0.9) flashContact();
        } else {
            camera.fov = THREE.MathUtils.lerp(camera.fov, 80, 0.05);
        }
        camera.updateProjectionMatrix();
    }

    function flashContact() {
        scene.background = new THREE.Color(0xffffff);
        setTimeout(() => { 
            scene.background = new THREE.Color(0x050505); 
            reset();
        }, 150);
    }

    function reset() {
        gameState = 'READY';
        msg.innerText = "LOOK DOWN AT PLATE";
        ball.visible = false;
        progress = 0;
    }

    function animate() {
        requestAnimationFrame(animate);
        if (gameState === 'PITCHING') {
            progress += 0.015;
            if (progress > 1) reset();
            else ball.position.copy(pitchPath[Math.floor(progress * 99)]);
        }
        renderer.render(scene, camera);
    }

    init3D();
    startGaze();
</script>
</body>
</html>
