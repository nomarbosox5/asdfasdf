<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone Statcast Viz</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; height: 100%; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px;
            font-size: 12px; z-index: 10; font-family: -apple-system, sans-serif;
        }
        /* Important for Safari performance */
        #webgazerVideoContainer { display: none !important; }
    </style>
</head>
<body>

<div id="info">
    <b>Statcast Mobile</b><br>
    Status: <span id="status">Waiting for Camera...</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    let scene, camera, renderer, ball;
    let pitchPath = [];
    let progress = 0;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Batter position for mobile (closer to plate)
        camera.position.set(1.5, 4.5, 5); 
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Pitch Path (Statcast Simulation)
        for (let i = 0; i <= 100; i++) {
            let t = i / 100;
            let z = -60.5 + (60.5 * t);
            let x = Math.sin(t * Math.PI) * 1.2; 
            let y = 5.8 - (t * t * 3.5);
            pitchPath.push(new THREE.Vector3(x, y, z));
        }

        // Baseball
        ball = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        scene.add(ball);

        animate();
    }

    function setupWebGazer() {
        webgazer.setGazeListener((data, elapsedTime) => {
            if (data == null) return;

            // Mapping Gaze to Camera Perspective
            const nx = (data.x / window.innerWidth) - 0.5;
            const ny = (data.y / window.innerHeight) - 0.5;

            // Higher sensitivity for smaller iPhone screens
            camera.position.x = 1.5 + (nx * 3);
            camera.position.y = 4.5 - (ny * 2);
            
            // Zoom effect
            if (Math.abs(nx) < 0.15 && Math.abs(ny) < 0.15) {
                camera.fov = THREE.MathUtils.lerp(camera.fov, 40, 0.1);
            } else {
                camera.fov = THREE.MathUtils.lerp(camera.fov, 70, 0.1);
            }
            camera.updateProjectionMatrix();
        })
        .showVideoPreview(false) // Keeps performance high on mobile
        .begin();

        document.getElementById('status').innerText = "Tracking Active";
    }

    function animate() {
        requestAnimationFrame(animate);
        progress += 0.008; // Slower for better tracking on mobile
        if (progress > 1) progress = 0;

        let idx = Math.floor(progress * (pitchPath.length - 1));
        ball.position.copy(pitchPath[idx]);
        
        renderer.render(scene, camera);
    }

    init();
    setupWebGazer();
</script>
</body>
</html>
